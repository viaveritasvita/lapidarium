<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscar — Lapidarium</title>
<meta name="description" content="Busca no acervo do Lapidarium — vídeos, temas, símbolos, ritos e graus.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 84'><polygon points='42,8 78,74 6,74' fill='none' stroke='%23c9a84c' stroke-width='4'/><ellipse cx='42' cy='54' rx='12' ry='8' fill='none' stroke='%23c9a84c' stroke-width='2.5'/><circle cx='42' cy='54' r='3' fill='%23c9a84c'/></svg>">
<link rel="stylesheet" href="lapidarium.css">
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema" aria-label="Alternar tema">☀</button>

<div class="wrap">
<header>
  <a class="backlink" href="index.html">◂ Lapidarium</a>
  <div class="delta-wrap" id="deltaWrap">
    <div class="delta-halo"></div>
    <svg class="delta-rays" viewBox="0 0 120 120" style="position:absolute;inset:-18px;width:calc(100% + 36px);height:calc(100% + 36px)">
      <g transform="translate(60,60)" stroke="rgba(240,217,138,0.35)" stroke-width="0.8">
        <line x1="0" y1="-52" x2="0" y2="-44"/><line x1="0" y1="44" x2="0" y2="52"/><line x1="-52" y1="0" x2="-44" y2="0"/><line x1="44" y1="0" x2="52" y2="0"/>
        <line x1="-37" y1="-37" x2="-31" y2="-31"/><line x1="31" y1="-31" x2="37" y2="-37"/><line x1="-37" y1="37" x2="-31" y2="31"/><line x1="31" y1="31" x2="37" y2="37"/>
      </g>
    </svg>
    <div class="delta-svg-wrap">
      <svg viewBox="0 0 84 84" fill="none" style="width:100%;height:100%">
        <defs>
          <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5e49a"/><stop offset="55%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#7a6230"/></linearGradient>
          <radialGradient id="eyeRg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(240,217,138,0.28)"/><stop offset="100%" stop-color="rgba(201,168,76,0)"/></radialGradient>
        </defs>
        <polygon points="42,5 78,75 6,75" stroke="url(#dg)" stroke-width="2.2" fill="rgba(201,168,76,0.035)"/>
        <polygon points="42,18 65,64 19,64" stroke="#c9a84c" stroke-width=".5" stroke-dasharray="2,3.5" fill="none" opacity=".25"/>
        <ellipse id="eyeGlow" cx="42" cy="54" rx="13" ry="8.5" fill="url(#eyeRg)"/>
        <ellipse id="eyeOutline" cx="42" cy="54" rx="12" ry="7.5" stroke="url(#dg)" stroke-width="1.3" fill="none"/>
        <circle id="iris" cx="42" cy="54" r="5" fill="rgba(201,168,76,0.1)" stroke="url(#dg)" stroke-width="1"/>
        <circle id="pupil" cx="42" cy="54" r="2.2" fill="url(#dg)" opacity=".92"/>
        <circle id="spec" cx="43.2" cy="52.8" r=".7" fill="rgba(255,248,220,0.8)"/>
        <line x1="42" y1="40" x2="42" y2="44" stroke="#c9a84c" stroke-width=".7" opacity=".4"/><line x1="42" y1="64" x2="42" y2="68" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
        <line x1="28" y1="54" x2="32" y2="54" stroke="#c9a84c" stroke-width=".7" opacity=".4"/><line x1="52" y1="54" x2="56" y2="54" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
      </svg>
    </div>
  </div>
  <h1 class="site-name" style="font-size:clamp(1.5rem,4.5vw,2.4rem);letter-spacing:.4em">ACERVO</h1>
  <p class="page-tagline">Qual pedra o Irmão deseja lapidar hoje?</p>
</header>

<div class="searchbar">
  <div class="search-row">
    <span class="search-dot"></span>
    <input class="search-input" id="consulta" type="search" placeholder="Ex: pedra bruta, grau de mestre, Templários, Adonhiramita, história…" autofocus autocomplete="off">
  </div>
</div>
<div class="expansao" id="expansao"></div>

<div class="searchgrid">
  <aside class="facetas" id="facetas"></aside>
  <main id="resultados"><p class="vazio">Carregando o acervo…</p></main>
</div>

<footer><p>Lapidarium · In Nomine GADU · Omnia Vincit Lux</p></footer>
</div>

<script src="busca.js"></script>
<script src="ui.js"></script>
<script>
(async () => {
  const $ = (id) => document.getElementById(id);
  let filtros = {};
  await LapidariumBusca.iniciar({
    fontes: ["videos-epaminondas.json", "videos-urania.json"],
    tesauro: "tesauro.json"
  });
  const FACETAS = [["origem","GRUPO"],["ano","ANO"],["tags","TEMAS"],["autor","PALESTRANTE"],["rito","RITO"],["grau","GRAU"]];
  const badge = (o)=> (o||"").indexOf("pamin")>=0 ? "b-ep" : "b-ur";

  function render() {
    const q = $("consulta").value;
    const r = LapidariumBusca.buscar(q, filtros, { limite: 60 });
    $("expansao").innerHTML = (r.expansao.gruposAtivados.length && q)
      ? "Busca ampliada pelo <b>tesauro maçônico</b> — termos equivalentes incluídos." : "";
    if (!r.resultados.length) {
      $("resultados").innerHTML = "<p class='vazio'>Nenhuma pedra encontrada. Tente outro termo — o tesauro conhece sinônimos.</p>";
    } else {
      $("resultados").innerHTML =
        `<p class="contagem">${r.total} ${r.total===1?"vídeo":"vídeos"} no acervo</p><div class="vgrid">` +
        r.resultados.map(({item}) => `
          <a class="vc" href="${item.url||'#'}" target="_blank" rel="noopener">
            <div class="vc-thumb">${item.thumbnail?`<img class="vc-img" src="${item.thumbnail}" alt="" loading="lazy">`:""}
              <span class="vc-badge ${badge(item.origem)}">${item.origem||''}</span></div>
            <div class="vc-body"><p class="vc-title">${item.titulo||"(sem título)"}</p>
              <p class="vc-meta">${[(item.data||'').slice(0,10).split('-').reverse().join('/'),item.autor].filter(Boolean).join(' · ')}</p>
              ${(item.tags&&item.tags.length)?`<div class="vc-tags">${item.tags.slice(0,3).map(t=>`<span class="vtag">${t}</span>`).join('')}</div>`:''}
            </div></a>`).join("") + `</div>`;
    }
    $("facetas").innerHTML = FACETAS.map(([chave,rot]) => {
      const lista = (r.facetas[chave]||[]).slice(0,12);
      if (!lista.length) return "";
      return `<h3>${rot}</h3>` + lista.map(f =>
        `<button data-chave="${chave}" data-valor="${f.valor}" class="${filtros[chave]===f.valor?'ativa':''}">${f.valor}<span class="qtde">${f.qtde}</span></button>`).join("");
    }).join("");
    $("facetas").querySelectorAll("button").forEach(b => b.onclick = () => {
      const {chave,valor}=b.dataset; filtros[chave]=(filtros[chave]===valor)?null:valor; render();
    });
  }
  // prefill a partir de ?q= (vindo da home)
  const p = new URLSearchParams(location.search).get('q');
  if (p) $("consulta").value = p;
  let t; $("consulta").oninput = () => { clearTimeout(t); t = setTimeout(render, 180); };
  render();
})();
</script>
</body>
</html>
