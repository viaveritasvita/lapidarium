<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscar — Lapidarium</title>
<meta name="description" content="Busca no acervo do Lapidarium.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 84'><polygon points='42,8 78,74 6,74' fill='none' stroke='%23c9a84c' stroke-width='4'/><ellipse cx='42' cy='54' rx='12' ry='8' fill='none' stroke='%23c9a84c' stroke-width='2.5'/><circle cx='42' cy='54' r='3' fill='%23c9a84c'/></svg>">
<link rel="stylesheet" href="lapidarium.css">
<style>
  .grptoggle{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 4px;justify-content:center}
  .gt{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-d);background:transparent;border:1px solid var(--border);padding:7px 16px;cursor:pointer;transition:all .25s}
  .gt:hover{color:var(--text);border-color:var(--border-h)}
  .gt.ativa{color:var(--s1);background:var(--gold);border-color:var(--gold);font-weight:600}
  .chips-busca{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0 2px}
  .chipb{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.1em;border:1px solid rgba(201,168,76,.28);color:#c2b189;padding:4px 10px;cursor:pointer;text-transform:uppercase;background:rgba(201,168,76,.05);transition:all .25s}
  .chipb:hover{border-color:var(--gold);color:var(--gold-l)}
  .limpar{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.14em;color:var(--text-d);text-transform:uppercase;cursor:pointer;border:none;background:none;margin-left:10px}
  .limpar:hover{color:var(--gold)}
  body.light .gt.ativa{color:#fff}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema" aria-label="Alternar tema">☀ Tema</button>
<div class="wrap">
<header>
  <nav class="topnav"><a href="index.html">Início</a><a href="buscar.html" class="atual">Acervo</a><a href="epaminondas.html">Epaminondas</a><a href="urania.html">Urânia</a><a href="calendar.html">Calendário</a><a href="publicar.html">Acesso Restrito</a></nav>
  <div class="delta-wrap" id="deltaWrap">
    <div class="delta-halo"></div>
    <svg class="delta-rays" viewBox="0 0 120 120" style="position:absolute;inset:-18px;width:calc(100% + 36px);height:calc(100% + 36px)">
      <g transform="translate(60,60)" stroke="rgba(240,217,138,0.35)" stroke-width="0.8">
        <line x1="0" y1="-52" x2="0" y2="-44"/><line x1="0" y1="44" x2="0" y2="52"/><line x1="-52" y1="0" x2="-44" y2="0"/><line x1="44" y1="0" x2="52" y2="0"/>
        <line x1="-37" y1="-37" x2="-31" y2="-31"/><line x1="31" y1="-31" x2="37" y2="-37"/><line x1="-37" y1="37" x2="-31" y2="31"/><line x1="31" y1="31" x2="37" y2="37"/>
      </g>
    </svg>
    <div class="delta-svg-wrap">
      <svg viewBox="0 0 84 84" fill="none" style="width:100%;height:100%">
        <defs>
          <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5e49a"/><stop offset="55%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#7a6230"/></linearGradient>
          <radialGradient id="eyeRg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(240,217,138,0.28)"/><stop offset="100%" stop-color="rgba(201,168,76,0)"/></radialGradient>
        </defs>
        <polygon points="42,5 78,75 6,75" stroke="url(#dg)" stroke-width="2.2" fill="rgba(201,168,76,0.035)"/>
        <polygon points="42,18 65,64 19,64" stroke="#c9a84c" stroke-width=".5" stroke-dasharray="2,3.5" fill="none" opacity=".25"/>
        <ellipse id="eyeGlow" cx="42" cy="54" rx="13" ry="8.5" fill="url(#eyeRg)"/>
        <ellipse id="eyeOutline" cx="42" cy="54" rx="12" ry="7.5" stroke="url(#dg)" stroke-width="1.3" fill="none"/>
        <circle id="iris" cx="42" cy="54" r="5" fill="rgba(201,168,76,0.1)" stroke="url(#dg)" stroke-width="1"/>
        <circle id="pupil" cx="42" cy="54" r="2.2" fill="url(#dg)" opacity=".92"/>
        <circle id="spec" cx="43.2" cy="52.8" r=".7" fill="rgba(255,248,220,0.8)"/>
        <line x1="42" y1="40" x2="42" y2="44" stroke="#c9a84c" stroke-width=".7" opacity=".4"/><line x1="42" y1="64" x2="42" y2="68" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
        <line x1="28" y1="54" x2="32" y2="54" stroke="#c9a84c" stroke-width=".7" opacity=".4"/><line x1="52" y1="54" x2="56" y2="54" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
      </svg>
    </div>
  </div>
  <h1 class="site-name" style="font-size:clamp(1.5rem,4.5vw,2.4rem);letter-spacing:.4em">ACERVO</h1>
  <p class="page-tagline">Qual pedra o Irmão deseja lapidar hoje?</p>
</header>
<div class="searchbar">
  <div class="search-row">
    <span class="search-dot"></span>
    <input class="search-input" id="consulta" type="search" placeholder="Ex: pedra bruta, grau de mestre, Templários, história…" autofocus autocomplete="off">
  </div>
</div>
<div class="grptoggle" id="grptoggle">
  <button class="gt ativa" data-g="">Todos os acervos</button>
  <button class="gt" data-g="EpaminondasOnline">Epaminondas</button>
  <button class="gt" data-g="Grupo de Estudos Urânia">Urânia</button>
</div>
<div class="chips-busca">
  <button class="chipb" data-q="Aprendiz">Aprendiz</button>
  <button class="chipb" data-q="História">História</button>
  <button class="chipb" data-q="Templários">Templários</button>
  <button class="chipb" data-q="Simbolismo">Simbolismo</button>
  <button class="chipb" data-q="Adonhiramita">Adonhiramita</button>
  <button class="chipb" data-q="Beneficência">Beneficência</button>
  <button class="chipb" data-q="Iluminismo">Iluminismo</button>
</div>
<div class="expansao" id="expansao"></div>
<div class="searchgrid">
  <aside class="facetas" id="facetas"></aside>
  <main id="resultados"><p class="vazio">Carregando o acervo…</p></main>
</div>
<footer><p>Lapidarium · In Nomine G∴A∴D∴U∴ · Omnia Vincit Lux</p></footer>
</div>
<script src="config.js"></script>
<script src="busca.js"></script>
<script src="ui.js"></script>
<script>
(async () => {
  const $ = (id) => document.getElementById(id);
  let filtros = {};
  const vivos = await lapiFetch("video");
  await LapidariumBusca.iniciar(
    (vivos && vivos.length)
      ? { itens: vivos, tesauro: "tesauro.json" }
      : { fontes: ["videos-epaminondas.json", "videos-urania.json"], tesauro: "tesauro.json" }
  );
  const FACETAS = [["tipo","TIPO"],["ano","ANO"],["tags","TEMAS"],["autor","PALESTRANTE"],["rito","RITO"],["grau","GRAU"]];
  const badge = (o) => (o||"").indexOf("pamin")>=0 ? "b-ep" : "b-ur";
  const dataBR = (d) => (d||"").slice(0,10).split('-').reverse().join('/');
  function render() {
    const q = $("consulta").value;
    const r = LapidariumBusca.buscar(q, filtros, { limite: 80 });
    const ativos = Object.keys(filtros).filter(k=>filtros[k]);
    let aviso = (r.expansao.gruposAtivados.length && q) ? "Busca ampliada pelo <b>tesauro maconico</b>." : "";
    if (ativos.length) aviso += (aviso?"  ":"") + '<button class="limpar" onclick="window.__limpar()">limpar filtros</button>';
    $("expansao").innerHTML = aviso;
    if (!r.resultados.length) {
      $("resultados").innerHTML = "<p class='vazio'>Nenhuma pedra encontrada neste acervo. Tente outro termo, ou volte para <b>Todos os acervos</b>.</p>";
    } else {
      let html = '<p class="contagem">'+r.total+' '+(r.total===1?"item":"itens")+'</p><div class="vgrid">';
      r.resultados.forEach(({item}) => {
        html += '<a class="vc" href="'+(item.youtube_id?('video.html?v='+item.youtube_id):(item.anexo||item.anexos||'#'))+'"'+(item.youtube_id?'':' target="_blank" rel="noopener"')+'>'
          + '<div class="vc-thumb">'+(item.thumbnail?'<img class="vc-img" src="'+item.thumbnail+'" alt="" loading="lazy">':'')
          + '<span class="vc-badge '+badge(item.origem)+'">'+(item.origem||'').replace('Grupo de Estudos ','')+'</span></div>'
          + '<div class="vc-body"><p class="vc-title">'+(item.titulo||"(sem titulo)")+'</p>'
          + '<p class="vc-meta">'+[dataBR(item.data),item.autor].filter(Boolean).join(' · ')+'</p>'
          + ((item.tags&&item.tags.length)?'<div class="vc-tags">'+item.tags.slice(0,3).map(t=>'<span class="vtag">'+t+'</span>').join('')+'</div>':'')
          + lapiAnexoBtn(item)
          + '</div></a>';
      });
      $("resultados").innerHTML = html + '</div>';
    }
    let fh = '';
    FACETAS.forEach(([chave,rot]) => {
      const lista = (r.facetas[chave]||[]).slice(0,12);
      if (!lista.length) return;
      fh += '<h3>'+rot+'</h3>';
      lista.forEach(f => { fh += '<button data-chave="'+chave+'" data-valor="'+f.valor+'" class="'+(filtros[chave]===f.valor?'ativa':'')+'">'+f.valor+'<span class="qtde">'+f.qtde+'</span></button>'; });
    });
    $("facetas").innerHTML = fh;
    $("facetas").querySelectorAll("button").forEach(b => b.onclick = () => {
      const c=b.dataset.chave, v=b.dataset.valor; filtros[c]=(filtros[c]===v)?null:v; render();
    });
  }
  $("grptoggle").querySelectorAll(".gt").forEach(b => b.onclick = () => {
    $("grptoggle").querySelectorAll(".gt").forEach(x=>x.classList.remove("ativa"));
    b.classList.add("ativa"); filtros.origem = b.dataset.g || null; render();
  });
  document.querySelectorAll(".chipb").forEach(b => b.onclick = () => { $("consulta").value = b.dataset.q; render(); $("consulta").focus(); });
  window.__limpar = () => { filtros = {}; $("consulta").value=""; $("grptoggle").querySelectorAll(".gt").forEach((x,i)=>x.classList.toggle("ativa",i===0)); render(); };
  const params = new URLSearchParams(location.search);
  if (params.get('q')) $("consulta").value = params.get('q');
  let t; $("consulta").oninput = () => { clearTimeout(t); t = setTimeout(render, 180); };
  render();
})();
</script>
</body>
</html>
