<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeo — Lapidarium</title>
<meta name="description" content="Vídeo do acervo do Lapidarium.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 84'><polygon points='42,8 78,74 6,74' fill='none' stroke='%23c9a84c' stroke-width='4'/><ellipse cx='42' cy='54' rx='12' ry='8' fill='none' stroke='%23c9a84c' stroke-width='2.5'/><circle cx='42' cy='54' r='3' fill='%23c9a84c'/></svg>">
<link rel="stylesheet" href="lapidarium.css">
<style>
  .vwrap{max-width:860px;margin:0 auto}
  .v-player{position:relative;width:100%;aspect-ratio:16/9;background:#000;border:1px solid var(--border);margin-bottom:20px}
  .v-player iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .v-title{font-family:'Cinzel',serif;font-size:clamp(1.2rem,3vw,1.7rem);font-weight:600;color:var(--text);letter-spacing:.04em;margin-bottom:8px;line-height:1.3}
  .v-meta{color:var(--gold-d);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
  .v-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .v-desc{color:var(--text-d);font-size:1.02rem;line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
  .mat-list{display:flex;flex-direction:column;gap:8px;max-width:520px;margin:0 auto 30px}
  .mat-item{display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:var(--panel);padding:12px 16px;text-decoration:none;color:var(--text);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;transition:border-color .3s,background .3s}
  .mat-item:hover{border-color:var(--gold);background:rgba(201,168,76,.06)}
  .mat-ico{color:var(--gold);font-size:1.1rem}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema" aria-label="Alternar tema">☀ Tema</button>
<div class="wrap">
<header>
  <nav class="topnav"><a href="index.html">Início</a><a href="buscar.html">Acervo</a><a href="epaminondas.html">Epaminondas</a><a href="urania.html">Urânia</a><a href="calendar.html">Calendário</a><a href="publicar.html">Acesso Restrito</a></nav>
</header>
<div class="vwrap"><main id="video-box"><p class="vazio">Carregando o vídeo…</p></main></div>
<footer><p>Lapidarium · In Nomine G∴A∴D∴U∴ · Omnia Vincit Lux</p></footer>
</div>
<script src="config.js"></script>
<script src="ui.js"></script>
<script>
(async () => {
  const box=document.getElementById('video-box');
  const vid=new URLSearchParams(location.search).get('v')||new URLSearchParams(location.search).get('id');
  if(!vid){ box.innerHTML="<p class='vazio'>Vídeo não especificado. <a href='buscar.html'>Ir ao acervo</a></p>"; return; }
  let vids = await lapiFetch('video');
  if(!vids){ try{ const a=await (await fetch('videos-epaminondas.json')).json(); const b=await (await fetch('videos-urania.json')).json(); vids=(a.videos||[]).concat(b.videos||[]); }catch(e){ vids=[]; } }
  const v=(vids||[]).find(x=> (x.youtube_id||x.id)===vid);
  if(!v){ box.innerHTML="<p class='vazio'>Vídeo não encontrado no acervo. <a href='buscar.html'>Voltar ao acervo</a></p>"; return; }
  const yid=v.youtube_id||vid;
  document.title=(v.titulo||'Vídeo')+' — Lapidarium';
  let matsHtml='';
  if(v.anexos){
    const items=(''+v.anexos).split(' ;; ').map(s=>s.trim()).filter(Boolean)
      .map(s=>{const p=s.split('|');return{r:(p[0]||'Material').trim(),u:(p[1]||'').trim()};}).filter(m=>m.u);
    if(items.length) matsHtml='<p class="sec-label">Materiais que acompanham</p><div class="mat-list">'
      +items.map(m=>'<a class="mat-item" href="'+m.u+'" target="_blank" rel="noopener"><span class="mat-ico">▤</span>'+m.r+'</a>').join('')+'</div>';
  }
  const tagsArr = Array.isArray(v.tags)?v.tags:(''+(v.tags||'')).split(';');
  box.innerHTML=
    '<div class="v-player"><iframe src="https://www.youtube.com/embed/'+yid+'" title="'+(v.titulo||'')+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>'
    +'<h1 class="v-title">'+(v.titulo||'')+'</h1>'
    +'<p class="v-meta">'+[(v.origem||'').replace('Grupo de Estudos ',''),v.palestrante||v.autor||'',lapiData(v.data).split('-').reverse().join('/')].filter(Boolean).join(' · ')+'</p>'
    +((tagsArr.filter(t=>(''+t).trim()).length)?'<div class="v-tags">'+tagsArr.map(t=>(''+t).trim()).filter(Boolean).map(t=>'<span class="vtag">'+t+'</span>').join('')+'</div>':'')
    +(v.descricao?'<p class="v-desc">'+v.descricao+'</p>':'')
    +matsHtml
    +'<p style="margin-top:22px;text-align:center"><a class="mat-item" style="display:inline-flex;max-width:none" href="https://www.youtube.com/watch?v='+yid+'" target="_blank" rel="noopener"><span class="mat-ico">▶</span>Assistir no YouTube</a></p>';
})();
</script>
</body>
</html>
