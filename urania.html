<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo de Estudos Urânia — Lapidarium</title>
<meta name="description" content="Acervo em vídeo do Grupo de Estudos Urânia, no Lapidarium.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 84 84'><polygon points='42,8 78,74 6,74' fill='none' stroke='%23c9a84c' stroke-width='4'/><ellipse cx='42' cy='54' rx='12' ry='8' fill='none' stroke='%23c9a84c' stroke-width='2.5'/><circle cx='42' cy='54' r='3' fill='%23c9a84c'/></svg>">
<link rel="stylesheet" href="lapidarium.css">
</head>
<body class="theme-ur">
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema" aria-label="Alternar tema">☀ Tema</button>

<div class="wrap">
<header>
  <nav class="topnav"><a href="index.html">Início</a><a href="buscar.html">Acervo</a><a href="epaminondas.html">Epaminondas</a><a href="urania.html" class="atual">Urânia</a><a href="calendar.html">Calendário</a><a href="publicar.html">Acesso Restrito</a></nav>
  <div class="ghero">
    <img class="ghero-logo" src="urania.png" alt="Grupo de Estudos Urânia" onerror="this.style.display='none'">
    <h1 class="ghero-name">Urânia</h1>
    <p class="ghero-sub">Grupo de Estudos Urânia</p>
    <div class="ghero-stats">
      <div><span class="gs-n">60+</span><span class="gs-l">Vídeos</span></div>
      <div><span class="gs-n">2023</span><span class="gs-l">Desde</span></div>
      <div><span class="gs-n">20+</span><span class="gs-l">Oradores</span></div>
    </div>
    <div class="orn"><span class="ol"></span><span class="od"></span><span class="ol r"></span></div>
    <a class="backlink" href="buscar.html?q=" style="margin-bottom:0">Buscar em todo o acervo ▸</a>
  </div>
</header>

<p class="sec-label">Acervo em Vídeo</p>
<main id="grade"><p class="vazio">Carregando vídeos…</p></main>

<footer><p>Lapidarium · In Nomine G∴A∴D∴U∴ · Omnia Vincit Lux</p></footer>
</div>

<script src="config.js"></script>
<script src="ui.js"></script>
<script>
(async () => {
  const grade = document.getElementById('grade');
  try {
    let vids = await lapiFetch('video');
    if (vids && vids.length) { vids = vids.filter(v => (v.origem||'').toLowerCase().indexOf('rânia')>=0); }
    else { const dados = await (await fetch('videos-urania.json')).json(); vids = dados.videos||[]; }
    vids = vids.slice().sort((a,b)=>(''+(b.data||'')).localeCompare(''+(a.data||'')));
    if (!vids.length) { grade.innerHTML = "<p class='vazio'>Acervo em preparação.</p>"; return; }
    grade.innerHTML = `<div class="vgrid">` + vids.map(v => `
      <a class="vc" href="${v.url||'#'}" target="_blank" rel="noopener">
        <div class="vc-thumb"><img class="vc-img" src="${v.thumbnail||('https://img.youtube.com/vi/'+v.youtube_id+'/hqdefault.jpg')}" alt="" loading="lazy">
          <span class="vc-badge b-ur">Urânia</span></div>
        <div class="vc-body"><p class="vc-title">${v.titulo||''}</p>
          <p class="vc-meta">${lapiData(v.data).split('-').reverse().join('/')}${v.palestrante?' · '+v.palestrante:''}</p>
          ${(v.tags&&v.tags.length)?`<div class="vc-tags">${v.tags.slice(0,3).map(t=>`<span class="vtag">${t}</span>`).join('')}</div>`:''}
        </div></a>`).join('') + `</div>
      <p class="expansao" style="text-align:center">Acervo em expansão — em breve os vídeos completos e a busca por transcrição.</p>`;
  } catch(e) {
    grade.innerHTML = "<p class='vazio'>Não foi possível carregar o acervo (verifique a conexão).</p>";
  }
})();
</script>
</body>
</html>
